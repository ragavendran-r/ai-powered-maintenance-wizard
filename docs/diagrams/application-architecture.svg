<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI-Powered Maintenance Wizard Application Architecture</title>
  <desc id="desc">A layered architecture diagram showing the React frontend, FastAPI backend, deterministic maintenance services, AI and RAG services, NATS async workers, Qdrant, SQLite, artifacts, and local LLM runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="45%" stop-color="#f8fbf7"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="asyncGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="122%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#cbd5e1" stroke-width="0.7" opacity="0.35"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 2 L 10 6 L 1 10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowAi" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 2 L 10 6 L 1 10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 800 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .bandTitle { fill: #0f172a; font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.4px; }
      .label { fill: #0f172a; font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 700 10px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.4px; text-transform: uppercase; }
      .pillText { fill: #0f172a; font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { filter: url(#shadow); stroke: rgba(15, 23, 42, 0.12); stroke-width: 1.2; }
      .node { fill: #ffffff; stroke: rgba(15, 23, 42, 0.12); stroke-width: 1.2; filter: url(#shadow); }
      .nodeSoft { fill: rgba(255, 255, 255, 0.72); stroke: rgba(15, 23, 42, 0.12); stroke-width: 1.1; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrowThin { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
      .arrowAi { fill: none; stroke: #7c3aed; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrowAi); }
      .arrowAsync { fill: none; stroke: #ea580c; stroke-width: 2.2; marker-end: url(#arrow); }
      .legendDot { stroke: rgba(15, 23, 42, 0.18); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity="0.75"/>
  <circle cx="140" cy="870" r="220" fill="#bae6fd" opacity="0.18"/>
  <circle cx="1460" cy="160" r="230" fill="#fed7aa" opacity="0.18"/>
  <circle cx="1220" cy="850" r="200" fill="#ddd6fe" opacity="0.18"/>

  <text x="60" y="58" class="title">AI-Powered Maintenance Wizard Architecture</text>
  <text x="62" y="87" class="subtitle">Role-aware UI, deterministic maintenance core, evidence-grounded AI, async workers, and governed learning.</text>

  <g transform="translate(60 130)">
    <rect class="card" x="0" y="0" width="260" height="685" rx="18" fill="#ffffff" opacity="0.92"/>
    <text x="22" y="36" class="bandTitle">Plant Channels</text>
    <rect class="nodeSoft" x="22" y="62" width="216" height="112" rx="14" fill="#eff6ff"/>
    <text x="42" y="92" class="label">Role-based users</text>
    <text x="42" y="119" class="small">Admin, engineer, technician,</text>
    <text x="42" y="139" class="small">supervisor, planner, operator</text>
    <rect x="42" y="153" width="80" height="24" rx="12" fill="#dbeafe"/>
    <text x="57" y="170" class="pillText">JWT UI</text>

    <rect class="nodeSoft" x="22" y="202" width="216" height="102" rx="14" fill="#ecfdf5"/>
    <text x="42" y="232" class="label">Plant evidence</text>
    <text x="42" y="259" class="small">Manuals, SOPs, logs, CSVs,</text>
    <text x="42" y="279" class="small">JSON records, embedded PDFs</text>

    <rect class="nodeSoft" x="22" y="332" width="216" height="102" rx="14" fill="#fff7ed"/>
    <text x="42" y="362" class="label">IoT and historians</text>
    <text x="42" y="389" class="small">PLCs, gateways, sensors,</text>
    <text x="42" y="409" class="small">alerts, readings, spares</text>

    <rect class="nodeSoft" x="22" y="462" width="216" height="128" rx="14" fill="#f8fafc"/>
    <text x="42" y="492" class="label">Seeded steel assets</text>
    <text x="42" y="519" class="small">Hot strip mill drive</text>
    <text x="42" y="539" class="small">Blast furnace blower</text>
    <text x="42" y="559" class="small">Caster pump, hydraulics, crane</text>

    <rect x="22" y="618" width="216" height="40" rx="20" fill="#0f172a"/>
    <text x="52" y="644" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Evidence enters governed flows</text>
  </g>

  <g transform="translate(370 130)">
    <rect class="card" x="0" y="0" width="310" height="685" rx="18" fill="url(#frontendGrad)"/>
    <text x="24" y="36" class="bandTitle">React + Vite Frontend</text>
    <text x="24" y="61" class="small">Role-aware shell, streaming assistants, focused workflows</text>

    <rect class="node" x="24" y="90" width="262" height="68" rx="14"/>
    <text x="44" y="119" class="label">Command Center</text>
    <text x="44" y="143" class="small">Plant KPIs, Neo, risk queue</text>

    <rect class="node" x="24" y="178" width="262" height="68" rx="14"/>
    <text x="44" y="207" class="label">Assets and Diagnosis</text>
    <text x="44" y="231" class="small">Data-backed tabs, Morpheus, Smith</text>

    <rect class="node" x="24" y="266" width="262" height="76" rx="14"/>
    <text x="44" y="295" class="label">Work Execution</text>
    <text x="44" y="319" class="small">Technician and supervisor Neo modes</text>

    <rect class="node" x="24" y="362" width="262" height="76" rx="14"/>
    <text x="44" y="391" class="label">Planning and Reports</text>
    <text x="44" y="415" class="small">PM plans, dispatch, Markdown export</text>

    <rect class="node" x="24" y="458" width="262" height="76" rx="14"/>
    <text x="44" y="487" class="label">Learning Review</text>
    <text x="44" y="511" class="small">Judge, approve, snapshots, deploy gates</text>

    <rect class="node" x="24" y="554" width="262" height="76" rx="14"/>
    <text x="44" y="583" class="label">Admin and Ingestion</text>
    <text x="44" y="607" class="small">Users, document upload, JSON import</text>
  </g>

  <g transform="translate(730 130)">
    <rect class="card" x="0" y="0" width="400" height="685" rx="18" fill="url(#backendGrad)"/>
    <text x="24" y="36" class="bandTitle">FastAPI Backend</text>
    <text x="24" y="61" class="small">Typed APIs, RBAC guards, deterministic writes, validated AI contracts</text>

    <rect class="node" x="24" y="88" width="352" height="62" rx="14"/>
    <text x="44" y="115" class="label">Auth and RBAC</text>
    <text x="44" y="138" class="small">JWT, current user, role permissions, API-only users</text>

    <g transform="translate(24 178)">
      <rect class="nodeSoft" x="0" y="0" width="164" height="72" rx="14" fill="#ffffff"/>
      <text x="18" y="28" class="label">Assets API</text>
      <text x="18" y="51" class="small">Health, tabs, evidence</text>
      <rect class="nodeSoft" x="188" y="0" width="164" height="72" rx="14" fill="#ffffff"/>
      <text x="206" y="28" class="label">Work APIs</text>
      <text x="206" y="51" class="small">WO, planning, PM</text>

      <rect class="nodeSoft" x="0" y="92" width="164" height="72" rx="14" fill="#ffffff"/>
      <text x="18" y="120" class="label">Ingestion APIs</text>
      <text x="18" y="143" class="small">Files, JSON, records</text>
      <rect class="nodeSoft" x="188" y="92" width="164" height="72" rx="14" fill="#ffffff"/>
      <text x="206" y="120" class="label">Reports API</text>
      <text x="206" y="143" class="small">Insights, Markdown</text>

      <rect class="nodeSoft" x="0" y="184" width="164" height="78" rx="14" fill="#ffffff"/>
      <text x="18" y="211" class="label">Risk Engine</text>
      <text x="18" y="234" class="small">Anomaly, RUL, spares</text>
      <rect class="nodeSoft" x="188" y="184" width="164" height="78" rx="14" fill="#ffffff"/>
      <text x="206" y="211" class="label">RCA and PM</text>
      <text x="206" y="234" class="small">Morpheus drafts</text>

      <rect class="nodeSoft" x="0" y="282" width="164" height="78" rx="14" fill="#ffffff"/>
      <text x="18" y="309" class="label">Recommendation</text>
      <text x="18" y="332" class="small">Actions, confidence</text>
      <rect class="nodeSoft" x="188" y="282" width="164" height="78" rx="14" fill="#ffffff"/>
      <text x="206" y="309" class="label">Learning API</text>
      <text x="206" y="332" class="small">Judge, approve, export</text>
    </g>

    <rect class="node" x="24" y="570" width="352" height="62" rx="14"/>
    <text x="44" y="597" class="label">Repository Layer</text>
    <text x="44" y="620" class="small">Single path for reads, writes, migrations, seed data</text>
  </g>

  <g transform="translate(1180 130)">
    <rect class="card" x="0" y="0" width="360" height="685" rx="18" fill="url(#aiGrad)"/>
    <text x="24" y="36" class="bandTitle">AI, RAG, and Learning</text>
    <text x="24" y="61" class="small">Grounded assistants with live streams and reviewer gates</text>

    <rect class="node" x="24" y="90" width="312" height="76" rx="14"/>
    <text x="44" y="119" class="label">LLM Adapter</text>
    <text x="44" y="143" class="small">Mock, OpenAI-compatible, Ollama</text>

    <rect class="node" x="24" y="186" width="312" height="76" rx="14"/>
    <text x="44" y="215" class="label">Local Runtime</text>
    <text x="44" y="239" class="small">llama.cpp Qwen + LoRA, LM Studio, or Ollama</text>

    <rect class="node" x="24" y="282" width="312" height="82" rx="14"/>
    <text x="44" y="311" class="label">Retrieval Service</text>
    <text x="44" y="335" class="small">Qdrant first, SQLite vector fallback, rerank</text>

    <rect class="node" x="24" y="384" width="312" height="82" rx="14"/>
    <text x="44" y="413" class="label">LLM-as-a-Judge</text>
    <text x="44" y="437" class="small">Scores examples before approved reuse</text>

    <rect class="node" x="24" y="486" width="312" height="82" rx="14"/>
    <text x="44" y="515" class="label">PEFT Adapter Path</text>
    <text x="44" y="539" class="small">JSONL snapshots, artifacts, evaluation gates</text>

    <rect x="24" y="596" width="312" height="42" rx="21" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.2"/>
    <text x="54" y="623" class="pillText">Schema validation + fallback remain authoritative</text>
  </g>

  <g transform="translate(350 850)">
    <rect class="card" x="0" y="0" width="860" height="100" rx="18" fill="url(#dataGrad)"/>
    <text x="24" y="34" class="bandTitle">Operational Data Plane</text>
    <g transform="translate(24 50)">
      <rect class="nodeSoft" x="0" y="0" width="220" height="32" rx="16" fill="#ffffff"/>
      <text x="22" y="22" class="pillText">SQLite prototype store</text>
      <rect class="nodeSoft" x="240" y="0" width="220" height="32" rx="16" fill="#ffffff"/>
      <text x="262" y="22" class="pillText">Qdrant vector DB</text>
      <rect class="nodeSoft" x="480" y="0" width="160" height="32" rx="16" fill="#ffffff"/>
      <text x="503" y="22" class="pillText">Artifacts</text>
      <rect class="nodeSoft" x="660" y="0" width="150" height="32" rx="16" fill="#ffffff"/>
      <text x="681" y="22" class="pillText">Sample seeds</text>
    </g>
  </g>

  <g transform="translate(1040 28)">
    <rect class="card" x="0" y="0" width="500" height="70" rx="18" fill="url(#asyncGrad)"/>
    <text x="24" y="30" class="bandTitle">NATS JetStream Async Backbone</text>
    <text x="24" y="53" class="small">MW_IOT telemetry and MW_LEARNING jobs</text>
    <rect x="310" y="18" width="82" height="32" rx="16" fill="#ffffff" opacity="0.9"/>
    <text x="328" y="40" class="pillText">DLQ</text>
    <rect x="406" y="18" width="70" height="32" rx="16" fill="#ffffff" opacity="0.9"/>
    <text x="419" y="40" class="pillText">Workers</text>
  </g>

  <path class="arrow" d="M 320 220 C 345 220, 345 220, 370 220"/>
  <path class="arrowThin" d="M 320 360 C 345 360, 345 594, 370 594"/>
  <path class="arrowAsync" d="M 280 520 C 308 500, 330 484, 330 448 L 330 118 L 1004 118 C 1028 118, 1024 76, 1040 70"/>
  <path class="arrow" d="M 680 472 C 707 472, 705 250, 730 250"/>
  <path class="arrow" d="M 680 594 C 705 594, 705 594, 730 594"/>
  <path class="arrowAi" d="M 1130 360 C 1154 360, 1154 324, 1180 324"/>
  <path class="arrowAi" d="M 1130 480 C 1154 480, 1154 220, 1180 220"/>
  <path class="arrowAi" d="M 1490 262 C 1490 805, 1220 805, 990 850"/>
  <path class="arrow" d="M 930 762 C 930 800, 930 820, 930 850"/>
  <path class="arrowThin" d="M 1285 412 C 1238 660, 850 690, 850 850"/>
  <path class="arrowAsync" d="M 930 130 C 930 112, 1120 112, 1120 98"/>
  <path class="arrowAsync" d="M 1210 64 C 1308 64, 1308 478, 1215 514"/>
  <path class="arrowThin" d="M 1210 70 C 1260 90, 1260 305, 1180 326"/>
  <path class="arrow" d="M 730 700 C 705 700, 705 520, 680 520"/>

  <g transform="translate(60 900)">
    <rect class="nodeSoft" x="0" y="0" width="250" height="48" rx="14" fill="#ffffff"/>
    <circle class="legendDot" cx="24" cy="24" r="8" fill="#334155"/>
    <text x="44" y="21" class="tiny">Solid arrows</text>
    <text x="44" y="37" class="small">HTTP/API and persisted data flow</text>
  </g>
  <g transform="translate(1225 850)">
    <rect class="nodeSoft" x="0" y="0" width="315" height="98" rx="14" fill="#ffffff"/>
    <circle class="legendDot" cx="24" cy="25" r="8" fill="#7c3aed"/>
    <text x="44" y="22" class="tiny">Dashed purple</text>
    <text x="44" y="38" class="small">AI/RAG/learning context flow</text>
    <circle class="legendDot" cx="24" cy="67" r="8" fill="#ea580c"/>
    <text x="44" y="64" class="tiny">Orange arrows</text>
    <text x="44" y="80" class="small">Async NATS worker paths</text>
  </g>
</svg>
